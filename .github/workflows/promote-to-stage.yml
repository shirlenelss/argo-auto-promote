name: Promote to Stage

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote from dev to stage"
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update stage image tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          FILE="repo/overlay/stage/kustomization.yaml"

          # Replace the newTag value for nginx
          sed -i "s|newTag:.*|newTag: \"${TAG}\"|" "$FILE"

          echo "Updated $FILE to tag: $TAG"
          cat "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/overlay/stage/kustomization.yaml
          git commit -m "promote: stage image tag -> ${{ github.event.inputs.image_tag }}"
          git push
